name: smart_electric_crm
description: "Smart Electric CRM System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # --- UI & Animation ---
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  intl: ^0.19.0

  # --- Architecture & State (Riverpod Stable) ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # --- Networking & Routing ---
  dio: ^5.5.0
  go_router: ^14.2.0

  # --- Data ---
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # --- Code Generation ---
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0

  # --- Linting (Helpers) ---
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true