name: smart_electric_crm
description: "Smart Electric CRM System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  
  # --- UI & Animation ---
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  freezed_annotation: ^2.4.4

  # --- Architecture & State (Riverpod Stable) ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # --- Networking & Routing ---
  dio: ^5.5.0
  go_router: ^14.2.0

  # --- Data ---
  json_annotation: ^4.9.0
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  share_plus: ^12.0.1
  file_picker: ^8.1.7
  photo_view: ^0.15.0
  path: ^1.9.0
  http: ^1.2.1
  http_parser: ^4.0.0
  web: ^1.1.1
  fl_chart: ^1.1.1
  shared_preferences: ^2.5.4
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # --- Code Generation ---
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2

  # --- Linting (Helpers) ---
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
